name: Actualizar sitemap, datos de artículos, tarjetas, nav/footer y feed

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "**.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar nav y footer de artículos
        run: python3 actualizar_nav_footer.py

      - name: Generar articulos-data.json
        run: python3 generar_articulos_data.py

      - name: Generar feed.xml (RSS)
        run: python3 generar_feed.py

      - name: Actualizar tarjetas de secciones fijas en el home
        run: python3 generar_fixed_cards.py

      - name: Generar sitemap.xml
        run: python3 generar_sitemap.py

      - name: Subir cambios (solo si algo cambió)
        run: |
          git config user.name "sitemap-bot"
          git config user.email "actions@github.com"
          git add sitemap.xml articulos-data.json feed.xml index.html articulos/
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que subir."
          else
            git commit -m "chore: actualizar sitemap, datos, feed, tarjetas y nav/footer"
            git push
          fi
